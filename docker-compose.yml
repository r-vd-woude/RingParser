services:
  ringparser:
    build: .
    image: ringparser:latest
    container_name: ringparser
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/outputs:/app/data/outputs
    environment:
      # Server
      HOST: "0.0.0.0"
      PORT: "8000"
      DEBUG: "false"
      # Upload limits
      MAX_UPLOAD_SIZE: "10"       # MB
      MAX_UPLOAD_SIZE_SCHEMA: "256" # KB
      # Processing limits
      XML_CHUNK_SIZE: "1000"
      MAX_DATA_ROWS: "10000"
      MAX_RETAINED_FILES: "50"
      # API rate limits
      UPLOAD_LIMIT: "5/minute"
      DOWNLOAD_LIMIT: "5/minute"
      MAPPING_LIMIT: "100/minute"
      INFO_LIMIT: "10/minute"
      PARSE_LIMIT: "5/minute"
      # CORS — restrict to your domain in production
      CORS_ORIGINS: "*"
      CORS_CREDENTIALS: "true"
      CORS_METHODS: "GET,POST"
      CORS_HEADERS: "Content-Type"
    restart: unless-stopped
